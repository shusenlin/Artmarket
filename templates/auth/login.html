<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ArtMarket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/" class="nav-logo">ArtMarket</a>
            </div>
            {% include 'components/nav_links.html' %}
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>欢迎回来</h2>
                <p>登录您的账户继续探索艺术品</p>
            </div>

            <div id="formMessage" class="form-message" role="alert" hidden></div>
            
            <form id="loginForm" class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="••••••••" autocomplete="current-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span>记住我</span>
                    </label>
                    <span class="link-muted">忘记密码?</span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            
            <div class="auth-footer">
                <p>还没有账户? <a href="{{ url_for('auth.register') }}" class="link-primary">立即注册</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ArtMarket. All rights reserved.</p>
    </footer>

    <script>
        const messageBox = document.getElementById('formMessage');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = `form-message ${type}`;
            messageBox.hidden = false;
        }

        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            
            // 禁用按钮防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        remember: document.getElementById('remember').checked
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // 登录成功，跳转到首页
                    window.location.href = '/';
                } else {
                    // 显示错误
                    showMessage(data.error || '登录失败，请检查邮箱和密码', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('网络错误，请稍后重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
    {% include 'components/assistant_widget.html' %}
</body>
</html>
